{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-warning">404</h1>
    <i class="fas fa-search fa-4x text-warning mb-4"></i>
    <h2>Page Not Found</h2>
    <p class="lead mb-4">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Home</a>
</div>
{% endblock %}

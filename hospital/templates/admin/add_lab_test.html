{% extends "base.html" %}

{% block title %}Add Lab Test{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-flask me-2"></i>Add New Lab Test</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Test Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3" required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" class="form-control" name="price" step="100" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Report Time</label>
                            <input type="text" class="form-control" name="report_time" 
                                   placeholder="e.g., 6 hours, 24 hours" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Preparation Instructions</label>
                        <textarea class="form-control" name="preparation" rows="3" 
                                  placeholder="Fasting requirements, etc."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save me-2"></i>Add Lab Test
                        </button>
                        <a href="{{ url_for('admin_lab_tests') }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

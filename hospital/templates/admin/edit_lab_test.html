{% extends "base.html" %}

{% block title %}Edit Lab Test{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-flask me-2"></i>Edit Lab Test</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Test Name</label>
                        <input type="text" class="form-control" name="name" value="{{ test.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3" required>{{ test.description }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" class="form-control" name="price" value="{{ test.price }}" step="100" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Report Time</label>
                            <input type="text" class="form-control" name="report_time" value="{{ test.report_time }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Preparation Instructions</label>
                        <textarea class="form-control" name="preparation" rows="3">{{ test.preparation }}</textarea>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if test.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active</label>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save me-2"></i>Update Lab Test
                        </button>
                        <a href="{{ url_for('admin_lab_tests') }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
